name: Build WASM

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master

concurrency:
  group: build-wasm-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build WASM
        run: npm run build:wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: |
            src/wasm/
            compat/wasm/
          retention-days: 7
